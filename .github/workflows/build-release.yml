name: Build Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build'
        required: false
        default: ''

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-20.04
            artifact: scrivano-x86_64-unknown-linux-gnu
            rustflags: "-C target-cpu=x86-64"
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: scrivano-aarch64-apple-darwin
            rustflags: ""

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpulse-dev libclang-dev libasound2-dev libxdo-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install pulseaudio llvm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add Rust targets
        run: |
          rustup target add ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          cargo build --release --features "audio-playback" --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          mkdir -p release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/scrivano.exe release/
          else
            cp target/${{ matrix.target }}/release/scrivano release/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*
          retention-days: 5

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename binaries for release
        shell: bash
        run: |
          cd artifacts
          # Linux
          if [ -f "scrivano-x86_64-unknown-linux-gnu/scrivano" ]; then
            cp scrivano-x86_64-unknown-linux-gnu/scrivano scrivano-linux-x86_64
          fi
          # macOS
          if [ -f "scrivano-aarch64-apple-darwin/scrivano" ]; then
            cp scrivano-aarch64-apple-darwin/scrivano scrivano-macos-arm64
          fi

      - name: Upload Linux binary to Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/scrivano-linux-x86_64
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS binary to Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/scrivano-macos-arm64
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}